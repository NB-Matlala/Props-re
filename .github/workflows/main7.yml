name: Web PrivRent_ComsPics

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Web PrivRent(Inside)3"]
    types:
      - completed

jobs:
  followupjob1:
    runs-on: ubuntu-latest
    concurrency: multirunP5
    env:
      BASE_URL: ${{ vars.BASE_URL }}
      CON_STR: ${{ vars.CON_STR }}
      LOG_TRG: ${{ vars.LOG_TRG }}
      CON_STR_COMS: ${{ vars.CON_STR_COMS }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.11

      - name: Install other dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools==57.5.0
          
      - name: Install dependencies from requirements.txt
        run: |
          python -m pip install -r requirements.txt
          # If you want to avoid using the 2to3 tool, ensure that your dependencies are Python 3 compatible.

      - name: Run scrape
        run: |
          python PrivRentals_ComsPics.py 
